<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Mestre Iago</title>

<style>
body{
margin:0;
font-family:monospace;
background:black;
color:#00ff88;
overflow-x:hidden;
}

/* FUNDO MATRIX */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* CAIXAS */
.box{
background:#111;
padding:20px;
margin:20px auto;
width:300px;
border-radius:10px;
box-shadow:0 0 15px #00ff88;
text-align:center;
}

input,select,button{
margin:5px;
padding:8px;
width:90%;
background:black;
color:#00ff88;
border:1px solid #00ff88;
}

button:hover{
background:#00ff88;
color:black;
cursor:pointer;
}

/* GATINHO */
#gatinhoBox{
position:fixed;
top:20px;
left:20px;
text-align:center;
display:none;
animation:flutuar 3s infinite ease-in-out;
}

#falaGato{
background:#111;
border:1px solid #00ff88;
padding:8px;
border-radius:10px;
margin-top:5px;
}

@keyframes flutuar{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* CAVEIRA ADMIN */
#skull{
position:fixed;
bottom:20px;
right:20px;
font-size:30px;
cursor:pointer;
}

/* ACCESS GRANTED */
#acesso{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
display:none;
color:#00ff88;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="login" class="box">
<h2>Login</h2>
<input id="email" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">
<button onclick="fazerLogin()">Entrar</button>
<p id="erro"></p>
</div>

<div id="app" style="display:none;">
<h2 id="boasVindas"></h2>

<div id="gatinhoBox">
<img src="https://media.giphy.com/media/13borq7Zo2kulO/giphy.gif" width="120" style="filter:drop-shadow(0 0 10px #00aaff)">
<div id="falaGato">🐱 Bem-vindo, Mestre Iago...</div>
</div>

<div class="box">
<h3>Adicionar Registro</h3>
<input id="valor" type="number" placeholder="Valor">
<select id="tipo">
<option value="ganho">Ganho</option>
<option value="gasto">Gasto</option>
</select>
<select id="categoria">
<option>Comida</option>
<option>Entretenimento</option>
<option>Transporte</option>
<option>Outros</option>
</select>
<button onclick="addRegistro()">Salvar</button>
<p id="saldo"></p>
</div>

<div class="box">
<h3>Meta</h3>
<input id="nomeMeta" placeholder="Nome da meta">
<input id="valorMeta" type="number" placeholder="Valor total">
<button onclick="criarMeta()">Criar Meta</button>
<p id="metaInfo"></p>
</div>

</div>

<div id="adminArea" class="box" style="display:none;">
<h3>Área Admin</h3>
<input id="novoUser" placeholder="Novo usuário">
<input id="novaSenha" placeholder="Senha">
<select id="nivel">
<option value="user">Usuário</option>
<option value="admin">Admin</option>
</select>
<button onclick="criarUsuario()">Criar</button>
<div id="listaUsers"></div>
<button onclick="gerarLink()">Gerar link WhatsApp</button>
<p id="link"></p>
</div>

<div id="skull" onclick="pedirCodigo()">💀</div>
<div id="acesso">ACCESS GRANTED</div>

<script>

/* MATRIX FUNDO */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.height=window.innerHeight;
canvas.width=window.innerWidth;
let letras="01";
let font=14;
let colunas=canvas.width/font;
let drops=[];
for(let x=0;x<colunas;x++) drops[x]=1;
function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00ff88";
ctx.font=font+"px monospace";
for(let i=0;i<drops.length;i++){
let text=letras[Math.floor(Math.random()*letras.length)];
ctx.fillText(text,i*font,drops[i]*font);
if(drops[i]*font>canvas.height&&Math.random()>0.975) drops[i]=0;
drops[i]++;
}
}
setInterval(draw,33);

/* DADOS */
let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[
{email:"iago",senha:"mestre",role:"admin"}
];

let usuarioAtual=null;

function salvarUsuarios(){
localStorage.setItem("usuarios",JSON.stringify(usuarios));
}

/* LOGIN */
function fazerLogin(){
let email=document.getElementById("email").value;
let senha=document.getElementById("senha").value;
let user=usuarios.find(u=>u.email===email&&u.senha===senha);
if(user){
usuarioAtual=user;
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("boasVindas").innerText="👑 Bem-vindo, "+user.email;
if(user.email==="iago"){
document.getElementById("gatinhoBox").style.display="block";
}
mostrarAcesso();
}else{
document.getElementById("erro").innerText="Acesso Negado";
}
}

function mostrarAcesso(){
let a=document.getElementById("acesso");
a.style.display="block";
setTimeout(()=>{a.style.display="none"},2000);
}

/* REGISTROS */
function addRegistro(){
let valor=parseFloat(document.getElementById("valor").value);
let tipo=document.getElementById("tipo").value;
let dados=JSON.parse(localStorage.getItem(usuarioAtual.email))||[];
dados.push({valor,tipo});
localStorage.setItem(usuarioAtual.email,JSON.stringify(dados));
atualizarSaldo();
}

function atualizarSaldo(){
let dados=JSON.parse(localStorage.getItem(usuarioAtual.email))||[];
let saldo=0;
dados.forEach(d=>{
if(d.tipo==="ganho") saldo+=d.valor;
else saldo-=d.valor;
});
document.getElementById("saldo").innerText="Saldo: R$ "+saldo;
}

/* META */
function criarMeta(){
let nome=document.getElementById("nomeMeta").value;
let valor=document.getElementById("valorMeta").value;
localStorage.setItem("meta_"+usuarioAtual.email,JSON.stringify({nome,valor}));
document.getElementById("metaInfo").innerText="Meta: "+nome+" - R$"+valor;
}

/* ADMIN */
function pedirCodigo(){
let c=prompt("Digite o código");
if(c==="0086"&&usuarioAtual.role==="admin"){
document.getElementById("adminArea").style.display="block";
}
}

function criarUsuario(){
if(usuarioAtual.email!=="iago"){
alert("Somente Iago pode criar usuários");
return;
}
let u=document.getElementById("novoUser").value;
let s=document.getElementById("novaSenha").value;
let r=document.getElementById("nivel").value;
if(u==="iago"){alert("Já existe");return;}
usuarios.push({email:u,senha:s,role:r});
salvarUsuarios();
listar();
}

function listar(){
let div=document.getElementById("listaUsers");
div.innerHTML="";
usuarios.forEach(u=>{
div.innerHTML+=u.email+" - "+u.role+"<br>";
});
}

function gerarLink(){
let texto="Acesse meu sistema secreto 😈";
let url="https://wa.me/?text="+encodeURIComponent(texto);
document.getElementById("link").innerHTML="<a href='"+url+"' target='_blank'>Abrir WhatsApp</a>";
}

</script>

</body>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Mestre Iago</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:monospace;
background:black;
color:#00ff88;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;

z-index:-1;
}

.box{
background:#111;
padding:20px;
margin:20px auto;
width:320px;
border-radius:10px;
box-shadow:0 0 15px #00ff88;
text-align:center;
}

input,select,button{
margin:5px;
padding:8px;
width:90%;
background:black;
color:#00ff88;
border:1px solid #00ff88;
}

button:hover{
background:#00ff88;
color:black;
cursor:pointer;
}

#gato{
position:fixed;
top:20px;
left:20px;
display:none;
animation:flutuar 3s infinite ease-in-out;
}

@keyframes flutuar{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}

<body>

<canvas id="matrix"></canvas>

<div id="login" class="box">
<h2>Login</h2>
<input id="email" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<p id="erro"></p>
</div>

<div id="app" style="display:none;">
<h2 id="boasVindas"></h2>

<div id="gato">
<img src="https://media.giphy.com/media/13borq7Zo2kulO/giphy.gif" width="120"
style="filter:drop-shadow(0 0 10px #00aaff)">
<div>🐱 Bem-vindo, Mestre Iago</div>
</div>

<div id="keyIcon" onclick="mostrarSenha()">🔑</div>

<div class="box">
<h3>Adicionar Registro</h3>
<input id="valor" type="number" placeholder="Valor">
<select id="tipo">
<option value="ganho">Ganho</option>
<option value="gasto">Gasto</option>
</select>
<select id="categoria">
<option>Comida</option>
<option>Entretenimento</option>
<option>Transporte</option>
<option>Outros</option>
</select>
<button onclick="add()">Salvar</button>
<p id="saldo"></p>
</div>

<div class="box">
<h3>Meta</h3>
<input id="nomeMeta" placeholder="Nome da meta">
<input id="valorMeta" type="number" placeholder="Valor total">
<input type="date" id="dataMeta">
<button onclick="criarMeta()">Criar Meta</button>
<p id="metaInfo"></p>
</div>

<div class="box">
<canvas id="graficoGeral"></canvas>
</div>

<div class="box">
<canvas id="graficoCategoria"></canvas>
</div>

</div>

<div id="admin" class="box" style="display:none;">
<h3>Área Admin</h3>
<input id="novoUser" placeholder="Novo usuário">
<input id="novaSenha" placeholder="Senha">
<select id="nivel">
<option value="user">Usuário</option>
<option value="admin">Admin</option>
</select>
<button onclick="criarUsuario()">Criar</button>
<div id="lista"></div>
</div>

<div id="trocarSenha" class="box" style="display:none;">
<h3>Alterar Senha</h3>
<input type="password" id="senhaAtual" placeholder="Senha Atual">
<input type="password" id="novaSenhaUser" placeholder="Nova Senha">
<button onclick="alterarSenha()">Salvar</button>
</div>

<div id="skull" onclick="codigoAdmin()">💀</div>

<script>

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.height=window.innerHeight;
canvas.width=window.innerWidth;
let letras="01";
let font=14;
let colunas=canvas.width/font;
let drops=[];
for(let x=0;x<colunas;x++) drops[x]=1;
function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00ff88";
ctx.font=font+"px monospace";
for(let i=0;i<drops.length;i++){
let text=letras[Math.floor(Math.random()*letras.length)];
ctx.fillText(text,i*font,drops[i]*font);
if(drops[i]*font>canvas.height&&Math.random()>0.975)drops[i]=0;
drops[i]++;
}
}
setInterval(draw,33);

/* DADOS */
let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[
{email:"iago",senha:"mestre",role:"admin"}
];
let atual=null;

function salvarUsuarios(){
localStorage.setItem("usuarios",JSON.stringify(usuarios));
}

function login(){
let email=document.getElementById("email").value;
let senha=document.getElementById("senha").value;
let user=usuarios.find(u=>u.email===email&&u.senha===senha);
if(user){
atual=user;
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("boasVindas").innerText="👑 Bem-vindo "+user.email;
if(user.email==="iago"){
document.getElementById("gato").style.display="block";
}
atualizarTudo();
}else{
document.getElementById("erro").innerText="Acesso Negado";
}
}

function add(){
let valor=parseFloat(document.getElementById("valor").value);
let tipo=document.getElementById("tipo").value;
let categoria=document.getElementById("categoria").value;
let dados=JSON.parse(localStorage.getItem(atual.email))||[];
dados.push({valor,tipo,categoria});
localStorage.setItem(atual.email,JSON.stringify(dados));
atualizarTudo();
}

function atualizarTudo(){
let dados=JSON.parse(localStorage.getItem(atual.email))||[];
let saldo=0;
let ganhos=0;
let gastos=0;
let categorias={};

dados.forEach(d=>{
if(d.tipo==="ganho"){saldo+=d.valor;ganhos+=d.valor;}
else{saldo-=d.valor;gastos+=d.valor;}

if(!categorias[d.categoria])categorias[d.categoria]=0;
categorias[d.categoria]+=d.valor;
});

document.getElementById("saldo").innerText="Saldo: R$ "+saldo;

new Chart(document.getElementById("graficoGeral"),{
type:"doughnut",
data:{
labels:["Ganhos","Gastos"],
datasets:[{data:[ganhos,gastos],
backgroundColor:["#00ff88","#ff0033"]}]
}
});

new Chart(document.getElementById("graficoCategoria"),{
type:"bar",
data:{
labels:Object.keys(categorias),
datasets:[{
data:Object.values(categorias),
backgroundColor:"#00ff88"
}]
}
});
}

function criarMeta(){
let nome=document.getElementById("nomeMeta").value;
let valor=parseFloat(document.getElementById("valorMeta").value);
let data=new Date(document.getElementById("dataMeta").value);
let hoje=new Date();
let dias=Math.ceil((data-hoje)/(1000*60*60*24));
let porDia=(valor/dias).toFixed(2);
document.getElementById("metaInfo").innerHTML=
"Meta: "+nome+"<br>"+
"Faltam "+dias+" dias<br>"+
"Guardar por dia: R$"+porDia;
}

function mostrarSenha(){
document.getElementById("trocarSenha").style.display="block";
}

function alterarSenha(){
let atualSenha=document.getElementById("senhaAtual").value;
let nova=document.getElementById("novaSenhaUser").value;
if(atual.senha!==atualSenha){alert("Senha incorreta");return;}
atual.senha=nova;
let index=usuarios.findIndex(u=>u.email===atual.email);
usuarios[index].senha=nova;
salvarUsuarios();
alert("Senha alterada!");
}

function codigoAdmin(){
let c=prompt("Digite o código:");
if(c==="0086"&&atual.role==="admin"){
document.getElementById("admin").style.display="block";
}
}

function criarUsuario(){
if(atual.email!=="iago"){alert("Somente Iago pode criar");return;}
let u=document.getElementById("novoUser").value;
let s=document.getElementById("novaSenha").value;
let r=document.getElementById("nivel").value;
usuarios.push({email:u,senha:s,role:r});
salvarUsuarios();
document.getElementById("lista").innerHTML+=u+" - "+r+"<br>";
}

</script>
</body>
</html>
