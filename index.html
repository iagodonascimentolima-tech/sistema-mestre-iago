
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labirinto do Lobo</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
    color: white;
    text-align: center;
}

canvas {
    background: #111;
    display: block;
    margin: auto;
    border: 3px solid #444;
}

#info {
    margin-top: 10px;
}
</style>
</head>
<body>

<h2>🐺 Fuja do Lobo!</h2>
<canvas id="game"></canvas>
<div id="info">Use as SETAS para se mover</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size = 25; 
const rows = 20;
const cols = 20;

canvas.width = cols * size;
canvas.height = rows * size;

let maze = [];
let player = {x: 0, y: 0};
let wolf = {x: cols-1, y: rows-1};
let exit = {x: cols-1, y: 0};

function generateMaze() {
    maze = [];
    for(let y = 0; y < rows; y++) {
        let row = [];
        for(let x = 0; x < cols; x++) {
            row.push(Math.random() > 0.3 ? 0 : 1);
        }
        maze.push(row);
    }

    maze[0][0] = 0;
    maze[rows-1][cols-1] = 0;
    maze[exit.y][exit.x] = 0;
}

function drawMaze() {
    for(let y = 0; y < rows; y++) {
        for(let x = 0; x < cols; x++) {
            if(maze[y][x] === 1) {
                ctx.fillStyle = "#333";
            } else {
                ctx.fillStyle = "#000";
            }
            ctx.fillRect(x*size, y*size, size, size);
        }
    }
}

function drawPlayer() {
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x*size, player.y*size, size, size);
}

function drawWolf() {
    ctx.fillStyle = "red";
    ctx.fillRect(wolf.x*size, wolf.y*size, size, size);
}

function drawExit() {
    ctx.fillStyle = "lime";
    ctx.fillRect(exit.x*size, exit.y*size, size, size);
}

function moveWolf() {
    let dx = player.x - wolf.x;
    let dy = player.y - wolf.y;

    let moveX = dx !== 0 ? dx/Math.abs(dx) : 0;
    let moveY = dy !== 0 ? dy/Math.abs(dy) : 0;

    if(Math.abs(dx) > Math.abs(dy)) {
        if(maze[wolf.y][wolf.x + moveX] === 0)
            wolf.x += moveX;
    } else {
        if(maze[wolf.y + moveY] && maze[wolf.y + moveY][wolf.x] === 0)
            wolf.y += moveY;
    }
}

function checkGame() {
    if(player.x === wolf.x && player.y === wolf.y) {
        alert("🐺 O LOBO TE PEGOU!");
        resetGame();
    }

    if(player.x === exit.x && player.y === exit.y) {
        alert("🚪 VOCÊ ESCAPOU!");
        resetGame();
    }
}

function resetGame() {
    player = {x: 0, y: 0};
    wolf = {x: cols-1, y: rows-1};
    exit = {
        x: Math.floor(Math.random()*cols),
        y: Math.floor(Math.random()*rows)
    };
    generateMaze();
}

document.addEventListener("keydown", e => {
    let nx = player.x;
    let ny = player.y;

    if(e.key === "ArrowUp") ny--;
    if(e.key === "ArrowDown") ny++;
    if(e.key === "ArrowLeft") nx--;
    if(e.key === "ArrowRight") nx++;

    if(maze[ny] && maze[ny][nx] === 0) {
        player.x = nx;
        player.y = ny;
        moveWolf();
        checkGame();
    }

    draw();
});

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawMaze();
    drawExit();
    drawPlayer();
    drawWolf();
}

generateMaze();
draw();
</script>

</body>
</html>
