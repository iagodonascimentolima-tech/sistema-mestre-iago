
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Sistema Financeiro IA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0d0d0d;
color:white;
text-align:center;
}

.container{
width:90%;
max-width:900px;
margin:auto;
}

input,select,button{
padding:8px;
margin:5px;
border-radius:5px;
border:none;
}

button{
background:#00ff9c;
cursor:pointer;
}

.card{
background:#1b1b1b;
padding:15px;
margin:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Sistema Financeiro</h1>

<div id="login">

<h2>Login</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p id="erro"></p>

</div>

<div id="app" style="display:none">

<h2>Painel</h2>

<div class="card">

<h3>Adicionar movimento</h3>

<select id="tipo">
<option value="ganho">Ganho</option>
<option value="gasto">Gasto</option>
</select>

<select id="categoria">
<option>comida</option>
<option>lazer</option>
<option>transporte</option>
<option>salario</option>
<option>outros</option>
</select>

<input id="valor" type="number" placeholder="valor">

<button onclick="add()">Salvar</button>

</div>

<div class="card">

<h3>Totais</h3>

<p id="dia"></p>
<p id="semana"></p>
<p id="mes"></p>

</div>

<div class="card">

<h3>Assistente Financeiro (IA)</h3>

<p id="mensagemIA">Analisando seus gastos...</p>

</div>

<div class="card">

<h3>Movimentos</h3>

<div id="lista"></div>

</div>

<div class="card">

<h3>Meta pessoal</h3>

<input id="metaNome" placeholder="nome da meta">
<input id="metaValor" type="number" placeholder="valor meta">
<input id="metaData" type="date">

<button onclick="addMeta()">Criar meta</button>

<div id="metas"></div>

</div>

<div class="card">

<h3>Gráficos</h3>

<canvas id="pizza"></canvas>
<canvas id="barra"></canvas>

</div>

</div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("dados")) || []
let metas = JSON.parse(localStorage.getItem("metas")) || []

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="iago" && p==="mestre"){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

atualizar()

}else{

document.getElementById("erro").innerText="Login incorreto"

}

}

function add(){

let tipo=document.getElementById("tipo").value
let cat=document.getElementById("categoria").value
let val=parseFloat(document.getElementById("valor").value)

let obj={
tipo:tipo,
categoria:cat,
valor:val,
data:new Date().toISOString()
}

dados.push(obj)

localStorage.setItem("dados",JSON.stringify(dados))

atualizar()

}

function atualizar(){

let lista=document.getElementById("lista")
lista.innerHTML=""

let ganho=0
let gasto=0

dados.forEach(d=>{

let data=new Date(d.data)

let item=document.createElement("p")

item.innerText=
d.tipo+" | "+d.categoria+" | R$"+d.valor+
" | "+data.toLocaleString()

lista.appendChild(item)

if(d.tipo==="ganho") ganho+=d.valor
else gasto+=d.valor

})

document.getElementById("dia").innerText="Ganhos: "+ganho+" Gastos: "+gasto
document.getElementById("semana").innerText="Saldo: "+(ganho-gasto)
document.getElementById("mes").innerText="Movimento total: "+(ganho+gasto)

grafico()

analiseIA()

mostrarMetas()

}

function grafico(){

let cat={}

dados.forEach(d=>{

if(!cat[d.categoria]) cat[d.categoria]=0

cat[d.categoria]+=d.valor

})

let labels=Object.keys(cat)
let valores=Object.values(cat)

new Chart(document.getElementById("pizza"),{

type:"pie",

data:{
labels:labels,
datasets:[{data:valores}]
}

})

new Chart(document.getElementById("barra"),{

type:"bar",

data:{
labels:labels,
datasets:[{data:valores}]
}

})

}

function analiseIA(){

let categorias={}
let total=0

dados.forEach(d=>{

if(d.tipo==="gasto"){

total+=d.valor

if(!categorias[d.categoria]){

categorias[d.categoria]=0

}

categorias[d.categoria]+=d.valor

}

})

let maiorCategoria=""
let maiorValor=0

for(let c in categorias){

if(categorias[c]>maiorValor){

maiorValor=categorias[c]
maiorCategoria=c

}

}

let mensagem=""

if(total===0){

mensagem="Ainda não há gastos registrados."

}else{

let porcentagem=(maiorValor/total)*100

if(porcentagem>50){

mensagem="⚠️ Você está gastando muito com "+maiorCategoria

}
else if(porcentagem>30){

mensagem="⚠️ Seus gastos com "+maiorCategoria+" estão altos."

}
else{

mensagem="✅ Seus gastos estão equilibrados."

}

}

document.getElementById("mensagemIA").innerText=mensagem

}

function addMeta(){

let nome=document.getElementById("metaNome").value
let valor=parseFloat(document.getElementById("metaValor").value)
let data=document.getElementById("metaData").value

let hoje=new Date()
let fim=new Date(data)

let meses=(fim.getFullYear()-hoje.getFullYear())*12+(fim.getMonth()-hoje.getMonth())

let mensal=valor/(meses||1)

metas.push({
nome:nome,
valor:valor,
data:data,
mensal:mensal
})

localStorage.setItem("metas",JSON.stringify(metas))

mostrarMetas()

}

function mostrarMetas(){

let div=document.getElementById("metas")

div.innerHTML=""

metas.forEach(m=>{

let p=document.createElement("p")

p.innerText=
m.nome+" meta R$"+m.valor+
" guardar por mês R$"+m.mensal.toFixed(2)+
" até "+m.data

div.appendChild(p)

})

}

</script>

</body>
</html>
